name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r bnrpe_jax/requirements.txt -r bnrpe_jax/requirements-docs.txt

      - name: Regenerate docs sources
        run: python bnrpe_jax/scripts/build_docs.py --repo-root .

      - name: Verify generated docs are committed
        run: git diff --exit-code docs/api docs/context_snapshot.md

      - name: Upload site artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: bnrpe-docs-site
          path: site

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
